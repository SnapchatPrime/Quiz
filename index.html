<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
    <title>ڕاگەیاندنی براوەکان 🏆</title>
    
    <style>
        /* بارکردنی فۆنتە کوردییەکە بە شێوەی لۆکاڵی */
        @font-face {
            font-family: 'KurdFont';
            src: url('kurdfont.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            /* بەکارهێنانی فۆنتە لۆکاڵییەکە بەسەر هەموو شتێکدا */
            font-family: 'KurdFont', Tahoma, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 10%, #1a1a1a, #000000);
            overflow-x: hidden;
        }

        .column {
            width: 100%; 
            max-width: 600px; 
            padding: 20px;
            box-sizing: border-box;
        }

        .content {
            background: rgba(20, 20, 20, 0.85);
            border-radius: 18px;
            padding: 40px 15px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(212, 175, 55, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: fadeInDown 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h2.title {
            color: #D4AF37;
            font-size: 2.6rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            letter-spacing: 0px;
            animation: textGlow 2s infinite alternate;
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }
            100% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.8), 0 0 30px rgba(212, 175, 55, 0.4); }
        }

        p.desc {
            font-size: 1.15rem;
            color: #ddd;
            margin-bottom: 45px;
            line-height: 1.6;
        }

        /* شێوازی ڕیزبەندی (Podium) */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            gap: 12px;
            margin-bottom: 40px;
            margin-top: 55px; 
        }

        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px 15px 6px 6px;
            padding: 15px 5px;
            width: 31%;
            position: relative;
            box-sizing: border-box;
            transition: transform 0.3s ease-out, box-shadow 0.3s ease-out;
            will-change: transform; 
        }

        .podium-item:hover {
            transform: translateY(-8px);
        }

        /* بەرزی جێگیر کراوە */
        .podium-item.first {
            height: 235px; 
            background: linear-gradient(to top, rgba(212, 175, 55, 0.25), rgba(10, 10, 10, 0.9));
            border: 1px solid #D4AF37;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.25);
            z-index: 2;
        }
        
        .podium-item.second { 
            height: 200px; 
            border: 1px solid #C0C0C0; 
            background: linear-gradient(to top, rgba(192, 192, 192, 0.15), rgba(10, 10, 10, 0.8));
            box-shadow: 0 5px 15px rgba(192, 192, 192, 0.1); 
        }
        
        .podium-item.third { 
            height: 180px; 
            border: 1px solid #CD7F32; 
            background: linear-gradient(to top, rgba(205, 127, 50, 0.15), rgba(10, 10, 10, 0.8));
            box-shadow: 0 5px 15px rgba(205, 127, 50, 0.1); 
        }

        /* وێنەکان و چوارچێوەکانیان */
        .img-wrapper {
            position: relative;
            margin-bottom: 18px;
        }

        .winner-img {
            border-radius: 50%;
            object-fit: cover;
            background-color: #222;
        }

        .first .winner-img { width: 85px; height: 85px; border: 3px solid #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
        .second .winner-img { width: 68px; height: 68px; border: 3px solid #C0C0C0; }
        .third .winner-img { width: 63px; height: 63px; border: 3px solid #CD7F32; }

        /* تاج بۆ یەکەم */
        .crown {
            position: absolute;
            top: -42px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.8rem;
            filter: drop-shadow(0 2px 8px rgba(212, 175, 55, 0.8));
            animation: gentleFloat 3s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); } 
        }

        /* باجی ژمارەکان */
        .rank-badge {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #000;
            font-size: 1.1rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.6);
            /* دڵنیابوونەوە کە ژمارەکانیش هەمان فۆنتن */
            font-family: 'KurdFont', sans-serif;
            padding-top: 2px;
        }

        .first .rank-badge { background: linear-gradient(135deg, #F9E596, #D4AF37); width: 32px; height: 32px; font-size: 1.3rem; bottom: -12px; border: 2px solid #000; }
        .second .rank-badge { background: linear-gradient(135deg, #e6e6e6, #C0C0C0); }
        .third .rank-badge { background: linear-gradient(135deg, #e6a76c, #CD7F32); }

        /* زانیاری یوزەرەکان */
        .username {
            font-size: 1.15rem;
            font-weight: bold;
            color: #fff;
            margin: 0 0 6px 0;
            direction: ltr;
            word-break: break-all;
        }
        .first .username { font-size: 1.25rem; color: #F9E596; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        .score {
            font-size: 1rem;
            color: #bbb;
            font-weight: bold;
            margin-top: auto;
        }
        .first .score { color: #fff; background: rgba(212, 175, 55, 0.2); padding: 2px 10px; border-radius: 12px; }

        /* دوگمەی تەلەگرام */
        .btn-telegram {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 40px;
            background: linear-gradient(135deg, #D4AF37, #AA8529);
            color: #050505;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
            transition: transform 0.3s ease-out, box-shadow 0.3s ease-out;
            letter-spacing: 0px;
        }

        .btn-telegram:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.6);
        }
    </style>
</head>
<body>

<div class="column">
  <div class="content">
    
    <h2 class="title">پاڵەوانەکانی پڕایم 🏆</h2>
    <p class="desc">پیرۆزبایی لەم سێ بەڕێزە دەکەین کە توانیان بە کەمترین کات و هەوڵ یارییەکە تەواو بکەن.</p>

    <div class="podium-container">
        
        <div class="podium-item second">
            <div class="img-wrapper">
                <img src="https://i.postimg.cc/522dcgwN/IMG-20260601-164740-454.jpg" alt="دووەم" class="winner-img">
                <div class="rank-badge">2</div>
            </div>
            <h3 class="username">𝑹𝒆𝒅𝒚𝒂𝒓</h3>
            <span class="score">٢٠ خاڵ</span>
        </div>

        <div class="podium-item first">
            <div class="crown">👑</div>
            <div class="img-wrapper">
                <img src="https://i.postimg.cc/FKF05LqN/IMG-20260601-003023-641.jpg" alt="یەکەم" class="winner-img">
                <div class="rank-badge">1</div>
            </div>
            <h3 class="username">Awin</h3>
            <span class="score">٢٠ خاڵ</span>
        </div>

        <div class="podium-item third">
            <div class="img-wrapper">
                <img src="https://i.postimg.cc/gjH5QLjf/IMG-20260601-164814-978.jpg" alt="سێیەم" class="winner-img">
                <div class="rank-badge">3</div>
            </div>
            <h3 class="username">Zulayxa🖤</h3>
            <span class="score">١٩.٥ خاڵ</span>
        </div>

    </div>

    <a href="https://t.me/hamasade" target="_blank" class="btn-telegram">
