<div class="column" style="width: 100%; max-width: 600px; margin: auto;">
  <div class="content" style="background: rgba(0, 0, 0, 0.05); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #ddd;">
    <h2>پێشبڕکێی Snapchat Prime 🏆</h2>
    <p>وەڵامی ئەم ٥ پرسیارە بدەرەوە، ٣ کەسی یەکەم کلیلی ڤی ئای پی دەبەنەوە!</p>
    <hr>

    <div id="already-played-section" style="display: none; padding: 20px;">
        <h3 style="color: red;">❌ تۆ پێشتر بەشداریت کردووە!</h3>
        <p>تەنیا یەکجار مافی بەشداریکردنت هەیە. چاوەڕێی پێشبڕکێی داهاتوو بە.</p>
    </div>

    <div id="username-section">
      <p style="font-weight: bold;">بۆ بەشداریکردن، یوزەری تەلەگرامی خۆت بنووسە:</p>
      <input type="text" id="tg-username" placeholder="@YourUsername" style="padding: 12px; width: 80%; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; font-size: 16px;">
      <br>
      <button onclick="startQuiz()" style="padding: 10px 25px; background-color: #fffc00; color: black; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px;">دەستپێکردنی کویز</button>
    </div>

    <div id="quiz-section" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <p id="progress-text" style="margin: 0; font-size: 14px; color: #666; font-weight: bold;"></p>
        <p id="timer-text" style="margin: 0; font-size: 16px; color: #d9534f; font-weight: bold; background: #fdfdfe; padding: 5px 10px; border-radius: 5px; border: 1px solid #d9534f;">⏱️ ١٠ چرکە</p>
      </div>
      <h3 id="question-text" style="margin-bottom: 20px; color: #333;"></h3>
      <div id="options-area" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>

    <div id="result-section" style="display: none;">
      <h3 style="color: #28a745;">کویزەکە تەواو بوو! 🎉</h3>
      <h2 id="score-text"></h2>
      <p id="final-message" style="margin-top: 10px; font-weight: bold;"></p>
    </div>
  </div>
</div>

<script>
  // زانیارییەکانی بۆتی تەلەگرامەکەت
 

    // زانیارییەکانی بۆتی تەلەگرامەکەت
  const BOT_TOKEN = "8755532350:AAHbBSjy3FsuPdNYQ5nE3iHMMXN26-j49Vg"; 
  
  // لێرەدا دەتوانیت چەند ئایدییەک بتەوێت زیادی بکەیت لەناو کەوانەکاندا
  const CHAT_IDS = ["5909261841", "708637965"]; 


  // بانکی پرسیارەکان (زیاتر لە 15 پرسیار)
  const allQuestions = [
    { q: "کام وڵات بە خاکی هەڵاتنی خۆر ناسراوە؟", options: ["چین", "ژاپۆن", "کۆریا", "تایلەند"], answer: "ژاپۆن" },
    { q: "مۆندیالی 2022 لە کام وڵات بەڕێوەچوو؟", options: ["قەتەر", "ڕوسیا", "بەڕازیل", "ئەڵمانیا"], answer: "قەتەر" },
    { q: "کێ زۆرترین باڵۆن دۆری بردووەتەوە لە مێژووی تۆپی پێدا؟", options: ["لیۆنێل مێسی", "کریستیانۆ ڕۆناڵدۆ", "پێلێ", "مارادۆنا"], answer: "لیۆنێل مێسی" },
    { q: "کام کیشوەر گەورەترینە لە ڕووی ڕووبەرەوە؟", options: ["ئاسیا", "ئەفریقا", "ئەمریکای باکوور", "ئەوروپا"], answer: "ئاسیا" },
    { q: "کام هەسارە بە هەسارەی سوور ناسراوە؟", options: ["مەریخ", "زوهڕە", "موشتەری", "عەتارید"], answer: "مەریخ" },
    { q: "خێراترین ئاژەڵی سەر زەوی کامەیە؟", options: ["چیتە (پڵنگ)", "شێر", "ئاسک", "هەڵۆ"], answer: "چیتە (پڵنگ)" },
    { q: "یەکەم کەس کە چووە سەر مانگ کێ بوو؟", options: ["نیڵ ئارمسترۆنگ", "یوری گاگارین", "باز ئۆڵدرین", "ئایلۆن مەسک"], answer: "نیڵ ئارمسترۆنگ" },
    { q: "وێنەکێشی تابلۆی 'مۆنالیزا' کێیە؟", options: ["لیۆناردۆ داڤینچی", "ڤینسێنت ڤان گۆخ", "پابلۆ پیکاسۆ", "مایکڵ ئەنجێلۆ"], answer: "لیۆناردۆ داڤینچی" },
    { q: "سیمبولی کیمیایی بۆ ئاو چییە؟", options: ["H2O", "CO2", "O2", "NaCl"], answer: "H2O" },
    { q: "گەورەترین ئۆقیانووس لە جیهاندا کامەیە؟", options: ["ئۆقیانووسی هێمن", "ئۆقیانووسی ئەتڵەسی", "ئۆقیانووسی هیندی", "ئۆقیانووسی بەستەڵەکی باکوور"], answer: "ئۆقیانووسی هێمن" },
    { q: "لە یاری باسکەدا چەند یاریزان بۆ هەر تیپێک لەناو یاریگادان؟", options: ["5", "6", "7", "11"], answer: "5" },
    { q: "پایتەختی ئیمپراتۆریەتی عوسمانی پێش ئەستەنبوڵ کوێ بوو؟", options: ["ئەدیرنە", "بورسا", "قۆنیا", "ئەنقەرە"], answer: "ئەدیرنە" },
    { q: "لە یاری شەترەنجدا کام پارچە تەنیا بە خوار و خێچ (دیالۆگ) دەڕوات؟", options: ["فیل", "ئەسپ", "قەڵا", "پاشا"], answer: "فیل" },
    { q: "جەنگی جیهانی دووەم لە چ ساڵێک کۆتایی هات؟", options: ["1945", "1939", "1918", "1950"], answer: "1945" },
    { q: "دراوی فەرمی وڵاتی یابان چییە؟", options: ["یەن", "یوان", "وۆن", "دۆلار"], answer: "یەن" }
  ];

  let selectedQuestions = [];
  let currentQuestion = 0;
  let score = 0;
  let username = "";
  let timeLeft = 10;
  let timerInterval;

  // پشکنین ئایا پێشتر یاری کردووە
  window.onload = function() {
      if(localStorage.getItem("snap_prime_quiz_played") === "true") {
          document.getElementById("username-section").style.display = "none";
          document.getElementById("already-played-section").style.display = "block";
      }
  };

  // تێکەڵکردنی ئارەی (Array) بۆ پرسیار و هەڵبژاردەکان
  function shuffleArray(array) {
      let currentIndex = array.length, randomIndex;
      while (currentIndex != 0) {
          randomIndex = Math.floor(Math.random() * currentIndex);
          currentIndex--;
          [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
      }
      return array;
  }

  function startQuiz() {
    username = document.getElementById("tg-username").value;
    if(username.trim() === "" || !username.includes("@")) {
      alert("تکایە یوزەری تەلەگرام بە دروستی بنووسە (بە @ دەست پێ بکات).");
      return;
    }
    
    // سەیڤکردنی ڕێگری لە فێڵکردن
    localStorage.setItem("snap_prime_quiz_played", "true");

    // هەڵبژاردنی 5 پرسیاری هەڕەمەکی
    let shuffledQuestions = shuffleArray([...allQuestions]);
    selectedQuestions = shuffledQuestions.slice(0, 5);

    document.getElementById("username-section").style.display = "none";
    document.getElementById("quiz-section").style.display = "block";
    loadQuestion();
  }

  function startTimer() {
      timeLeft = 10;
      document.getElementById("timer-text").innerText = `⏱️ ${timeLeft} چرکە`;
      document.getElementById("timer-text").style.color = "#d9534f";
      
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
          timeLeft--;
          document.getElementById("timer-text").innerText = `⏱️ ${timeLeft} چرکە`;
          
          if(timeLeft <= 3) {
              document.getElementById("timer-text").style.color = "red";
          }

          if(timeLeft <= 0) {
              clearInterval(timerInterval);
              checkAnswer(null); // کات تەواو بوو واتە هەڵەیە
          }
      }, 1000);
  }

  function loadQuestion() {
    if(currentQuestion >= selectedQuestions.length) {
      showResults();
      return;
    }

    startTimer();

    const qData = selectedQuestions[currentQuestion];
    document.getElementById("question-text").innerText = qData.q;
    document.getElementById("progress-text").innerText = `پرسیاری ${currentQuestion + 1} / ${selectedQuestions.length}`;

    const optionsArea = document.getElementById("options-area");
    optionsArea.innerHTML = "";

    // تێکەڵکردنی هەڵبژاردەکان
    let shuffledOptions = shuffleArray([...qData.options]);

    shuffledOptions.forEach((opt) => {
      const btn = document.createElement("button");
      btn.innerText = opt;
      btn.style.padding = "12px";
      btn.style.border = "1px solid #ccc";
      btn.style.borderRadius = "8px";
      btn.style.backgroundColor = "#fff";
      btn.style.cursor = "pointer";
      btn.style.fontSize = "16px";
      btn.style.transition = "background 0.2s";
      
      btn.onmouseover = () => btn.style.backgroundColor = "#f1f1f1";
      btn.onmouseout = () => btn.style.backgroundColor = "#fff";

      btn.onclick = () => {
          clearInterval(timerInterval);
          checkAnswer(opt, qData.answer);
      }; 
      optionsArea.appendChild(btn);
    });
  }

  function checkAnswer(selectedOpt, correctOpt) {
    if(selectedOpt === correctOpt) {
      score++;
    }
    currentQuestion++;
    loadQuestion();
  }

  function showResults() {
    clearInterval(timerInterval);
    document.getElementById("quiz-section").style.display = "none";
    document.getElementById("result-section").style.display = "block";
    
    document.getElementById("score-text").innerText = `نمرەکەت: ${score} لە ${selectedQuestions.length}`;
    const finalMessageElement = document.getElementById("final-message");

    if (score >= 4) {
      finalMessageElement.innerText = "ئافەرین! نمرەیەکی بەرزت هێنا، یوزەرەکەت نێردرا بۆ بەڕێوەبەر.";
      finalMessageElement.style.color = "green";
      sendToTelegramBot(username, score);
    } else {
      finalMessageElement.innerText = "بەداخەوە نمرەکەت کەمە، هیوای سەرکەوتن بۆ جاری داهاتوو.";
      finalMessageElement.style.color = "red";
    }
  }

  function sendToTelegramBot(user, userScore) {
    const textMsg = `🏆 براوەیەکی نوێ کویزەکەی تەواو کرد!\n\n👤 یوزەر: ${user}\n🎯 نمرە: ${userScore} لە ${selectedQuestions.length}`;
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(textMsg)}`;

    fetch(url)
      .then(response => {
        if(!response.ok) {
          console.error("کێشە لە ناردنی داتا بۆ تەلەگرام.");
        }
      })
      .catch(err => console.error(err));
  }
</script>
