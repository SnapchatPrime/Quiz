<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
    <title>ڕاگەیاندنی براوەکان 🏆</title>
    
    <style>
        /* بارکردنی فۆنتە کوردییەکە بە شێوەی لۆکاڵی */
        @font-face {
            font-family: 'KurdFont';
            src: url('kurdfont.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'KurdFont', Tahoma, Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 10%, #1a1a1a, #000000);
            overflow-x: hidden;
        }

        .column {
            width: 100%; 
            max-width: 600px; 
            padding: 20px;
            box-sizing: border-box;
        }

        .content {
            background: rgba(20, 20, 20, 0.85);
            border-radius: 18px;
            padding: 40px 10px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(212, 175, 55, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: fadeInDown 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h2.title {
            color: #D4AF37;
            font-size: 2.4rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            letter-spacing: 0px;
            animation: textGlow 2s infinite alternate;
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }
            100% { text-shadow: 0 0 20px rgba(212, 175, 55, 0.8), 0 0 30px rgba(212, 175, 55, 0.4); }
        }

        p.desc {
            font-size: 1.1rem;
            color: #ddd;
            margin-bottom: 45px;
            line-height: 1.6;
        }

        /* شێوازی ڕیزبەندی (Podium) - گۆڕدرا بۆ ٥ بەش */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            gap: 6px; /* بۆشایی کەمکرایەوە بۆ جێبوونەوە */
            margin-bottom: 40px;
            margin-top: 55px; 
        }

        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px 12px 6px 6px;
            padding: 10px 2px;
            width: 19%; /* بۆ ئەوەی هەر ٥ دانەکە جێگەیان ببێتەوە */
            position: relative;
            box-sizing: border-box;
            transition: transform 0.3s ease-out, box-shadow 0.3s ease-out;
            will-change: transform; 
        }

        .podium-item:hover {
            transform: translateY(-8px);
        }

        /* بەرزییەکان بەپێی وێنەکە */
        .podium-item.first {
            height: 235px; 
            background: linear-gradient(to top, rgba(212, 175, 55, 0.25), rgba(10, 10, 10, 0.9));
            border: 1px solid #D4AF37;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.25);
            z-index: 5;
        }
        
        .podium-item.second { 
            height: 200px; 
            border: 1px solid #C0C0C0; 
            background: linear-gradient(to top, rgba(192, 192, 192, 0.15), rgba(10, 10, 10, 0.8));
            box-shadow: 0 5px 15px rgba(192, 192, 192, 0.1); 
            z-index: 4;
        }
        
        .podium-item.third { 
            height: 180px; 
            border: 1px solid #CD7F32; 
            background: linear-gradient(to top, rgba(205, 127, 50, 0.15), rgba(10, 10, 10, 0.8));
            box-shadow: 0 5px 15px rgba(205, 127, 50, 0.1); 
            z-index: 3;
        }

        /* ستایلی چوارەم و پێنجەم بە هەمان ڕۆحی دیزاینەکەت */
        .podium-item.fourth {
            height: 150px;
            border: 1px solid #888;
            background: linear-gradient(to top, rgba(136, 136, 136, 0.15), rgba(10, 10, 10, 0.8));
            box-shadow: 0 5px 15px rgba(136, 136, 136, 0.1);
            z-index: 2;
        }

        .podium-item.fifth {
            height: 130px;
            border: 1px solid #666;
            background: linear-gradient(to top, rgba(102, 102, 102, 0.15), rgba(10, 10, 10, 0.8));
            box-shadow: 0 5px 15px rgba(102, 102, 102, 0.1);
            z-index: 1;
        }

        /* وێنەکان و چوارچێوەکانیان - کەمێک بچووک کراونەتەوە بۆ شاشە */
        .img-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        .winner-img {
            border-radius: 50%;
            object-fit: cover;
            background-color: #222;
        }

        .first .winner-img { width: 60px; height: 60px; border: 3px solid #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
        .second .winner-img { width: 58px; height: 58px; border: 2px solid #C0C0C0; }
        .third .winner-img { width: 53px; height: 53px; border: 2px solid #CD7F32; }
        .fourth .winner-img { width: 45px; height: 45px; border: 2px solid #888; }
        .fifth .winner-img { width: 40px; height: 40px; border: 2px solid #666; }

        /* تاج بۆ یەکەم */
        .crown {
            position: absolute;
            top: -38px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            filter: drop-shadow(0 2px 8px rgba(212, 175, 55, 0.8));
            animation: gentleFloat 3s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-6px); } 
        }

        /* باجی ژمارەکان */
        .rank-badge {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #000;
            font-size: 0.95rem;
            box-shadow: 0 3px 8px rgba(0,0,0,0.6);
            font-family: 'KurdFont', sans-serif;
            padding-top: 2px;
        }

        .first .rank-badge { background: linear-gradient(135deg, #F9E596, #D4AF37); width: 28px; height: 28px; font-size: 1.15rem; bottom: -10px; border: 2px solid #000; }
        .second .rank-badge { background: linear-gradient(135deg, #e6e6e6, #C0C0C0); }
        .third .rank-badge { background: linear-gradient(135deg, #e6a76c, #CD7F32); }
        .fourth .rank-badge { background: linear-gradient(135deg, #ccc, #888); }
        .fifth .rank-badge { background: linear-gradient(135deg, #aaa, #666); color: #fff; }

        /* زانیاری یوزەرەکان */
        .username {
            font-size: 0.8rem;
            font-weight: bold;
            color: #fff;
            margin: 0 0 4px 0;
            direction: ltr;
            word-break: break-all;
        }
        .first .username { font-size: 1.05rem; color: #F9E596; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        .score {
            font-size: 0.75rem;
            color: #bbb;
            font-weight: bold;
            margin-top: auto;
        }
        .first .score { color: #fff; font-size: 0.85rem; background: rgba(212, 175, 55, 0.2); padding: 2px 8px; border-radius: 12px; }

        /* دوگمەی تەلەگرام */
        .btn-telegram {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 40px;
            background: linear-gradient(135deg, #D4AF37, #AA8529);
            color: #050505;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
            transition: transform 0.3s ease-out, box-shadow 0.3s ease-out;
            letter-spacing: 0px;
        }

        .btn-telegram:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.6);
        }
    </style>
</head>
<body>

<div class="column">
  <div class="content">
    
    <h2 class="title">پاڵەوانەکانی پڕایم 🏆</h2>
    <p class="desc">پیرۆزبایی لەم ٥ بەڕێزە دەکەین کە توانیان بە کەمترین کات و هەوڵ یارییەکە تەواو بکەن.</p>
    
    <div class="podium-container">
        
        <!-- چوارەم -->
        <div class="podium-item fourth">
            <div class="img-wrapper">
                <img src="https://i.postimg.cc/Rh684cLr/20260707-093037.png" alt="چوارەم" class="winner-img">
                <div class="rank-badge">4</div>
            </div>
            <h3 class="username">🖤,</h3>
            <span class="score">١٤.٩ خاڵ</span>
        </div>

        <!-- دووەم -->
        <div class="podium-item second">
            <div class="img-wrapper">
                <img src="https://i.postimg.cc/qqwtB3BJ/20260707-092707.png" alt="دووەم" class="winner-img">
                <div class="rank-badge">2</div>
            </div>
            <h3 class="username">🩵.</h3>
            <span class="score">١٥.٣ خاڵ</span>
        </div>

        <!-- یەکەم (لە ناوەڕاست) -->
        <div class="podium-item first">
            <div class="crown">👑</div>
            <div class="img-wrapper">
                <img src="https://i.postimg.cc/LXZBsvw7/20260707-092438.jpg" alt="یەکەم" class="winner-img">
                <div class="rank-badge">1</div>
            </div>
            <h3 class="username">suhaib</h3>
            <span class="score">١٦ خاڵ</span>
        </div>

        <!-- سێیەم -->
        <div class="podium-item third">
            <div class="img-wrapper">
                <img src="https://i.postimg.cc/Px2hPzDF/20260707-092843.png" alt="سێیەم" class="winner-img">
                <div class="rank-badge">3</div>
            </div>
            <h3 class="username">Sarkan</h3>
            <span class="score">١٥.٢ خاڵ</span>
        </div>

        <!-- پێنجەم -->
        <div class="podium-item fifth">
            <div class="img-wrapper">
                <img src="https://i.postimg.cc/2yhsnQLz/20260707-093203.png" alt="پێنجەم" class="winner-img">
                <div class="rank-badge">5</div>
            </div>
            <h3 class="username">reko</h3>
            <span class="score">١٤.٥ خاڵ</span>
        </div>

    </div>

    <a href="https://t.me/hamasade" target="_blank" class="btn-telegram">
        سەردانی کەناڵ بکە
    </a>

  </div>
</div>

</body>
</html>
