<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
    <title>یاری تەواو بوو 🛑</title>
    <style>
        @font-face {
            font-family: 'Rudaw';
            src: url('coolfont1.ttf'); 
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Rudaw', 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center; /* ناوەڕاستکردنی ستوونی */
            background: radial-gradient(circle at 50% 30%, #1a1a1a, #000000);
        }

        /* هەمان قەبارە و چوارچێوەی دیزاینەکانی پێشوو */
        .column {
            width: 100%; 
            max-width: 600px; 
            margin: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .content {
            background: rgba(20, 20, 20, 0.85);
            border-radius: 18px;
            padding: 40px 20px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(212, 175, 55, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .icon-box {
            font-size: 5rem;
            margin-bottom: 10px;
            animation: gentleFloat 3s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h2.title {
            color: #ff4c4c; /* ڕەنگی سووری کاڵ بۆ ئاگادارکردنەوە */
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 10px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        p.desc {
            font-size: 1.15rem;
            color: #E8F0ED;
            line-height: 1.8;
            margin-bottom: 35px;
        }

        .highlight {
            color: #D4AF37;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* دوگمەی تەلەگرام */
        .btn-telegram {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #0088cc, #005580);
            color: #ffffff;
            font-weight: bold;
            border: 2px solid #00aaff;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            text-decoration: none;
            box-shadow: 0 6px 20px rgba(0, 136, 204, 0.4);
            transition: all 0.3s ease;
        }

        .btn-telegram:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0, 136, 204, 0.6);
            background: linear-gradient(135deg, #0099e6, #006699);
        }
    </style>
</head>
<body>

<div class="column">
  <div class="content">
    
    <div class="icon-box">🏆</div>
    
    <h2 class="title">یاری تەواو بوو! 🛑</h2>
    
    <hr style="border: 0; height: 1px; background: rgba(212, 175, 55, 0.2); margin: 20px 0;">
    
    <p class="desc">
        زۆر سوپاس بۆ بەشداریکردنتان، کاتی پێشبڕکێی پڕایم کۆتایی هات.<br><br>
        بۆ زانینی ناوی <span class="highlight">براوەکان</span> و وەرگرتنی کلیلی ئێڵیت، تکایە سەردانی کەناڵی فەرمی بکەن:
    </p>

    <a href="https://t.me/hamasade" target="_blank" class="btn-telegram">
        سەردانی کەناڵ ✈️
    </a>

  </div>
</div>

</body>
</html>
